<!DOCTYPE html>
<html>
<head>
    <title>{{ profile.username }} - Instagram Profile</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .profile-header { display: flex; align-items: center; }
        .profile-header img { border-radius: 50%; width: 100px; height: 100px; margin-right: 20px; }
        .stats { margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 20px; }
        .grid img, .grid video { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="profile-header">
        <img src="{{ profile.profile_picture_url }}" alt="Profile Picture">
        <div>
            <h1>{{ profile.username }}</h1>
            <div class="stats">
                <strong>Posts:</strong> {{ profile.media_count }}<br>
                <strong>Account Type:</strong> {{ profile.account_type }}
            </div>
        </div>
    </div>

    <div class="grid">
        {% for post in media %}
            {% if post.media_type == "IMAGE" %}
                <a href="{{ post.permalink }}" target="_blank">
                    <img src="{{ post.media_url }}" alt="{{ post.caption }}">
                </a>
            {% elif post.media_type == "VIDEO" %}
                <a href="{{ post.permalink }}" target="_blank">
                    <video controls>
                        <source src="{{ post.media_url }}" type="video/mp4">
                    </video>
                </a>
            {% endif %}
        {% endfor %}
    </div>
</body>
</html>
